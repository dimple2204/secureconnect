spring:
  application:
    name: secureconnect
  datasource:
    url: jdbc:postgresql://localhost:5432/secureconnect
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000